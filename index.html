<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Review</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F3F6F4; --surface:#FFFFFF; --deep:#163832; --deep-light:#2C5D54;
    --text:#1B2624; --muted:#5B6B67; --gold:#C89B3C; --gold-soft:#EADFC2;
    --border:#E1E8E5; --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Noto Sans SC','Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    display:flex; justify-content:center; padding-bottom:110px;
  }
  .app{ width:100%; max-width:480px; padding:28px 20px 24px; }
  .clinic-name{ font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--deep-light); margin:0 0 6px; }
  .homepage-link{ display:inline-block; font-size:12px; font-weight:700; color:var(--gold); text-decoration:none; margin:0 0 10px; }
  .lang-switch{ font-size:12px; font-weight:700; color:var(--muted); background:none; border:none; cursor:pointer; padding:0; margin:0 0 10px; }
  h1{ font-size:24px; font-weight:800; line-height:1.35; margin:0 0 4px; color:var(--deep); }
  .sub{ font-size:14px; color:var(--muted); margin:0 0 22px; }
  .smile-wrap{ display:flex; flex-direction:column; align-items:center; margin-bottom:26px; }
  .smile-track{ fill:none; stroke:var(--border); stroke-width:6; stroke-linecap:round; }
  .smile-fill{ fill:none; stroke:var(--gold); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1); }
  .smile-label{ font-size:12px; color:var(--muted); margin-top:6px; font-weight:600; }
  .step{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 18px 16px; margin-bottom:14px; display:none; animation:rise .35s ease; }
  .step.active{ display:block; }
  @keyframes rise{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }
  .step-eyebrow{ font-size:12px; font-weight:700; color:var(--gold); letter-spacing:.03em; margin:0 0 4px; }
  .step-title{ font-size:17px; font-weight:700; margin:0 0 4px; color:var(--deep); }
  .step-desc{ font-size:12.5px; color:var(--muted); margin:0 0 14px; }
  .step-optional-tag{ display:inline-block; font-size:11px; font-weight:700; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:2px 8px; border-radius:999px; margin-left:6px; vertical-align:middle; }
  .options{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .options.single-col{ grid-template-columns:1fr; }
  .opt{ border:1.5px solid var(--border); background:#FBFCFB; border-radius:12px; padding:14px 10px; font-size:14px; font-weight:600; color:var(--text); text-align:center; cursor:pointer; transition:.15s ease; user-select:none; line-height:1.3; }
  .opt:active{ transform:scale(.97); }
  .opt.selected{ border-color:var(--deep); background:var(--deep); color:#fff; }
  .opt.category{ padding:18px 10px; font-size:15px; }
  .opt.lang{ padding:18px 10px; font-size:15px; }
  .translate-link{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:16px; padding:13px; border-radius:12px; border:1.5px dashed var(--border);
    background:#FBFCFB; color:var(--deep-light); font-size:13.5px; font-weight:700;
    text-decoration:none; transition:.15s ease;
  }
  .translate-link:active{ transform:scale(.98); }
  .opt.improvement.selected{ border-color:var(--gold); background:var(--gold); color:#fff; }
  .role-group{ margin-bottom:18px; }
  .role-group:last-child{ margin-bottom:0; }
  .role-header{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:var(--deep-light); margin-bottom:8px; padding-bottom:6px; border-bottom:1px dashed var(--border); }
  textarea{ width:100%; min-height:100px; border:1.5px solid var(--border); border-radius:12px; padding:14px; font-family:inherit; font-size:14.5px; line-height:1.6; resize:vertical; color:var(--text); }
  textarea:focus{ outline:none; border-color:var(--deep-light); }
  #manualText{ min-height:140px; }
  .note-label{ font-size:12.5px; font-weight:700; color:var(--deep-light); margin:16px 0 8px; }
  .bar{ position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; background:linear-gradient(to top, var(--bg) 60%, rgba(243,246,244,0)); padding:18px 20px 22px; }
  .bar-inner{ width:100%; max-width:480px; }
  .btn{ width:100%; padding:16px; border:none; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; transition:.15s ease; font-family:inherit; }
  .btn:active{ transform:scale(.98); }
  .btn-primary{ background:var(--deep); color:#fff; }
  .btn-primary:disabled{ background:#B7C4C0; cursor:not-allowed; }
  .btn-ghost{ background:transparent; color:var(--deep-light); font-weight:600; font-size:13.5px; padding:10px; margin-top:6px; width:100%; border:none; cursor:pointer; }
  .result-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:none; }
  .result-card.active{ display:block; animation:rise .4s ease; }
  .result-badge{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--deep-light); background:var(--gold-soft); padding:5px 10px; border-radius:999px; margin-bottom:12px; }
  .result-text{ font-size:15px; line-height:1.75; color:var(--text); white-space:pre-wrap; margin:0 0 18px; }
  .platform-label{ font-size:12.5px; color:var(--muted); margin:0 0 10px; }
  .platform-actions{ display:flex; flex-direction:column; gap:10px; }
  .platform-btn{ width:100%; padding:15px; border:1.5px solid var(--border); background:#FBFCFB; border-radius:12px; font-size:14.5px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--text); }
  .platform-btn.google{ border-color:var(--deep); color:var(--deep); }
  .platform-btn.naver{ border-color:#03C75A; color:#03A94D; display:none; }
  .loading{ display:none; align-items:center; gap:10px; padding:24px 4px; color:var(--muted); font-size:14px; font-weight:600; }
  .loading.active{ display:flex; }
  .spinner{ width:18px; height:18px; border:2.5px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .toast{ position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--deep); color:#fff; font-size:13.5px; font-weight:600; padding:10px 18px; border-radius:999px; opacity:0; pointer-events:none; transition:.25s ease; z-index:99; white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .setup-needed{ text-align:center; padding:60px 24px; }
  .setup-needed a{ display:inline-block; margin-top:18px; background:var(--deep); color:#fff; text-decoration:none; padding:14px 22px; border-radius:12px; font-weight:700; font-size:14px; }
  .privacy-note{ font-size:11.5px; color:var(--muted); text-align:center; line-height:1.6; margin-top:22px; padding:0 8px; }
  .footer-section{ margin-top:22px; padding-top:18px; border-top:1px dashed var(--border); }
  .share-row{ display:flex; gap:8px; margin-bottom:16px; }
  .icon-btn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:13px 6px; border:1.5px solid var(--border); background:#FBFCFB; border-radius:12px; text-decoration:none; color:var(--text); font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; transition:.15s ease; }
  .icon-btn:active{ transform:scale(.96); background:var(--bg); }
  .icon-btn-emoji{ font-size:21px; line-height:1; }
  .guide-box{ background:var(--gold-soft); border-radius:12px; padding:14px 16px; margin-bottom:10px; font-size:12.5px; line-height:1.7; color:var(--deep); }
  .thanks-box{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:12.5px; line-height:1.75; color:var(--muted); text-align:center; }
  .doctor-card{ display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-bottom:16px; }
  .doctor-card img{ width:44px; height:44px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--bg); }
  .doctor-card p{ margin:0; font-size:12.5px; line-height:1.55; color:var(--text); }
  .call-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px; border:none; border-radius:12px; background:var(--deep); color:#fff; font-size:14.5px; font-weight:700; text-decoration:none; margin-bottom:12px; font-family:inherit; }
  .call-btn:active{ transform:scale(.98); }
  .referral-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border:1.5px dashed var(--gold); border-radius:12px; background:none; color:var(--gold); font-size:13.5px; font-weight:700; margin-bottom:16px; cursor:pointer; font-family:inherit; }
  .referral-btn:active{ transform:scale(.98); }
  .sns-row{ display:flex; gap:8px; margin-bottom:16px; }
  .event-banner{ background:linear-gradient(135deg,var(--gold-soft),#fff); border:1px solid var(--gold-soft); border-radius:12px; padding:13px 15px; margin-bottom:16px; font-size:12px; line-height:1.6; color:var(--deep); }
  .event-banner-tag{ display:inline-block; font-size:10.5px; font-weight:800; color:#fff; background:var(--gold); padding:2px 8px; border-radius:999px; margin-bottom:6px; letter-spacing:.02em; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="setup-needed" id="setupNeeded" style="display:none;">
    <p class="step-eyebrow">⚠️ Setup required</p>
    <p class="step-title">This link isn't connected to a clinic yet<br>이 링크에는 아직 치과 정보가 연결되어 있지 않아요</p>
    <a href="./setup.html">Go to setup →</a>
  </div>

  <div id="mainContent" style="display:none;">
    <img id="clinicLogo" src="" alt="" style="display:none;height:32px;margin:0 0 10px;">
    <p class="clinic-name" id="clinicNameLabel"></p>
    <a href="#" id="homepageLink" class="homepage-link" target="_blank" rel="noopener" style="display:none;">🏠 <span id="homepageLinkText"></span></a>
    <button class="lang-switch" id="langSwitchBtn" style="display:none;">🌐 </button>
    <div class="doctor-card" id="doctorCard" style="display:none;">
      <img id="doctorPhotoImg" src="" alt="">
      <p id="doctorGreetingText"></p>
    </div>
    <h1 id="txtHeading"></h1>
    <p class="sub" id="txtSubtitle"></p>

    <div class="smile-wrap">
      <svg width="140" height="76" viewBox="0 0 140 76">
        <path class="smile-track" d="M10,20 Q70,76 130,20"/>
        <path class="smile-fill" id="smileFill" d="M10,20 Q70,76 130,20" stroke-dasharray="128" stroke-dashoffset="128"/>
      </svg>
      <p class="smile-label" id="smileLabel"></p>
    </div>

    <!-- Step lang: 언어 선택 -->
    <div class="step active" data-step="lang">
      <p class="step-eyebrow">🌐 Language / 언어 / 语言 / 言語 / Idioma</p>
      <p class="step-title">Select your language</p>
      <div class="options single-col" id="langOptions"></div>
      <a href="https://translate.google.com/" target="_blank" rel="noopener" class="translate-link">
        🗣️ Google Translate
      </a>
    </div>

    <div class="step" data-step="0">
      <p class="step-eyebrow" id="txtEyebrow0"></p>
      <p class="step-title" id="txtTitle0"></p>
      <div class="options">
        <div class="opt" data-group="method" data-value="ai" id="optMethodAI"></div>
        <div class="opt" data-group="method" data-value="manual" id="optMethodManual"></div>
      </div>
    </div>

    <div class="step" data-step="1">
      <p class="step-eyebrow" id="txtEyebrow1"></p>
      <p class="step-title" id="txtTitle1"></p>
      <div class="options" id="visitOptions"></div>
    </div>

    <div class="step" data-step="2">
      <p class="step-eyebrow" id="txtEyebrow2"></p>
      <p class="step-title" id="txtTitle2"></p>
      <div class="options single-col" id="categoryOptions"></div>
    </div>

    <div class="step" data-step="3">
      <p class="step-eyebrow" id="txtEyebrow3"></p>
      <p class="step-title" id="treatmentTitle"></p>
      <div class="options" id="treatmentOptions"></div>
    </div>

    <div class="step" data-step="4">
      <p class="step-eyebrow" id="txtEyebrow4"></p>
      <p class="step-title" id="txtTitle4"></p>
      <p class="step-desc" id="txtDesc4"></p>
      <div id="experienceGroups"></div>
    </div>

    <div class="step" data-step="5">
      <p class="step-eyebrow" id="txtEyebrow5"></p>
      <p class="step-title" id="txtTitle5"></p>
      <p class="step-desc" id="txtDesc5"></p>
      <div id="improvementGroups"></div>
      <p class="note-label" id="txtNoteLabel"></p>
      <textarea id="additionalNote"></textarea>
    </div>

    <div class="step" data-step="manual">
      <p class="step-eyebrow" id="txtManualEyebrow"></p>
      <p class="step-title" id="txtManualTitle"></p>
      <textarea id="manualText"></textarea>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span id="txtLoading"></span>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-badge" id="txtResultBadge"></div>
      <p class="result-text" id="resultText"></p>
      <p class="platform-label" id="txtPlatformLabel"></p>
      <div class="platform-actions">
        <button class="platform-btn google" id="googleBtn"></button>
        <button class="platform-btn naver" id="naverBtn"></button>
      </div>

      <div class="footer-section">
        <a href="#" id="callBtn" class="call-btn" style="display:none;">
          <span>📞</span><span id="txtCallLabel"></span>
        </a>

        <div class="share-row">
          <a href="#" id="homepageIconBtn" class="icon-btn" target="_blank" rel="noopener" style="display:none;">
            <span class="icon-btn-emoji">🏠</span><span id="txtHomepageIconLabel"></span>
          </a>
          <button type="button" class="icon-btn" id="kakaoShareBtn">
            <span class="icon-btn-emoji">💬</span><span id="txtKakaoLabel"></span>
          </button>
          <button type="button" class="icon-btn" id="wechatShareBtn">
            <span class="icon-btn-emoji">🟢</span><span id="txtWechatLabel"></span>
          </button>
        </div>

        <div class="sns-row" id="snsRow" style="display:none;">
          <a href="#" id="instagramBtn" class="icon-btn" target="_blank" rel="noopener" style="display:none;">
            <span class="icon-btn-emoji">📷</span><span id="txtInstagramLabel"></span>
          </a>
          <a href="#" id="blogBtn" class="icon-btn" target="_blank" rel="noopener" style="display:none;">
            <span class="icon-btn-emoji">✍️</span><span id="txtBlogLabel"></span>
          </a>
        </div>

        <div class="event-banner" id="eventBanner" style="display:none;">
          <span class="event-banner-tag" id="txtEventTag"></span>
          <p id="txtEventNote" style="margin:0;"></p>
        </div>

        <button type="button" class="referral-btn" id="referralBtn">
          <span>🎁</span><span id="txtReferralLabel"></span>
        </button>

        <div class="guide-box" id="txtGuideNote"></div>
        <div class="thanks-box" id="txtThanksNote"></div>
      </div>
    </div>

    <p class="privacy-note" id="txtPrivacyNote"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="bar" id="bar" style="display:none;">
  <div class="bar-inner">
    <button class="btn btn-primary" id="mainBtn" disabled></button>
    <button class="btn-ghost" id="ghostBtn" style="display:none;"></button>
  </div>
</div>

<script>
/* ============================================================
   다국어 데이터 (ko / en / zh / ja / es)
   ============================================================ */

  { code:'ko', flag:'🇰🇷', name:'한국어' },

  { code:'ja', flag:'🇯🇵', name:'日本語' },
  { code:'es', flag:'🇪🇸', name:'Español' }
];
const LANG_FULL_NAME = { ko:'Korean', en:'English', zh:'Chinese (Simplified)', ja:'Japanese', es:'Spanish' };

  ortho: ['metal_braces','ceramic_braces','clear_aligner','lingual_braces','partial_braces','pediatric_ortho','re_treatment','ortho_consult_treat','overall']

const IMPROVEMENT_CATEGORY_ORDER = ['wait_booking','cost_info','facility','communication'];
const IMPROVEMENT_ITEM_ORDER = {
  wait_booking: ['long_wait','hard_reschedule'],
  cost_info: ['cost_info_lacking','cost_burden'],
  facility: ['parking_inconvenient','waiting_area_small'],
  communication: ['explanation_lacking','followup_lacking']
};

const ICONS = {
  category: { general:'🦷', ortho:'😁' },
  treatment: {
    cavity:'🪥', root_canal:'🔩', implant:'🦷', crown:'👑', whitening_scaling:'✨',
    wisdom_tooth:'😬', gum_treatment:'🩹', denture:'🦷', checkup:'🔍', overall:'💙',
    metal_braces:'⚙️', ceramic_braces:'🤍', clear_aligner:'👻', lingual_braces:'🙊',
    partial_braces:'🔹', pediatric_ortho:'🧒', re_treatment:'🔁', ortho_consult_treat:'💬'
  },
  role: { doctor:'🩺', counselor:'💬', staff:'🧑\u200d⚕️', desk:'🗓️' },
  improvementCategory: { wait_booking:'⏰', cost_info:'💳', facility:'🅿️', communication:'💬' }
};

const TRANSLATIONS = {
ko: {
  ui:{
    heading:'진료, 어떠셨나요?', subtitle:'잠깐만 알려주시면 리뷰를 만들어드려요',
    smileStart:'시작해볼까요?', smileReady:'준비됐어요', smileProgress:(n,t)=>`${n}/${t} 선택완료`,
    eyebrow0:'① 작성방식', title0:'리뷰를 어떻게 작성할까요?', methodAI:'AI 문구 생성 ✨', methodManual:'직접 입력 ✍️',
    eyebrow1:'② 방문유형', title1:'이번 방문은?',
    eyebrow2:'③ 진료분야', title2:'어느 분야로 진료받으셨나요?',
    eyebrow3:'④ 세부 치료', title3Suffix:'중 어떤 치료를 받으셨나요?', title3Default:'어떤 치료를 받으셨나요?',
    eyebrow4:'⑤ 경험선택', title4:'어떤 점이 좋으셨나요?', desc4:'담당자별로 좋았던 점을 골라주세요 (중복 가능)',
    eyebrow5:'⑥ 개선사항', tag5:'선택사항', title5:'아쉬웠던 점이 있으셨나요?', desc5:'있으시면 골라주세요. 없으시면 바로 다음으로 넘어가도 돼요',
    noteLabel:'더 남기고 싶은 말 (선택)', notePlaceholder:'예) 대기 공간에 물이 있으면 좋을 것 같아요',
    manualEyebrow:'✍️ 직접 입력', manualTitle:'리뷰 내용을 적어주세요', manualPlaceholder:'예) 상담부터 시술까지 친절하게 설명해주셔서 편안하게 진료받았어요.',
    loadingText:'리뷰를 작성하고 있어요...',
    resultBadge:'✅ 리뷰가 준비됐어요', platformLabel:'리뷰는 자동으로 복사됩니다. 원하시는 플랫폼을 선택하세요',
    btnNext:'다음', btnMakeReview:'✨ 리뷰 만들기', btnCheckReview:'리뷰 확인하기', btnRegenerate:'🔄 다시 만들기',

const params = new URLSearchParams(window.location.search);
const CLINIC_NAME = params.get('name');
const GOOGLE_REVIEW_URL = params.get('google');
const NAVER_REVIEW_URL = params.get('naver');
const HOMEPAGE_URL = params.get('homepage');

// 온라인 브랜딩 확장 파라미터 (모두 선택값)
const CLINIC_ID = params.get('cid');               // 관리자 알림/통계 매핑용 식별자 (없으면 병원명 사용)
const REGION = params.get('region');                // 예: "강남 치과" — 리뷰 문구에 자연스럽게 1회만 반영
const PHONE = params.get('phone');                  // 예: 0212345678 — 하단 "전화로 예약하기" 버튼
const INSTAGRAM_URL = params.get('instagram');       // 인스타그램 팔로우 링크
const BLOG_URL = params.get('blog');                 // 네이버 블로그 링크
const EVENT_NOTE = params.get('event');              // 포토리뷰/SNS 이벤트 안내문 (자유 텍스트, 원문 그대로 표시)
const DOCTOR_PHOTO = params.get('doctorPhoto');       // 원장님 사진 URL
const DOCTOR_GREETING = params.get('doctorGreeting'); // 원장님 한줄 인사말 (자유 텍스트, 원문 그대로 표시)
const LOGO_URL = params.get('logo');                  // 병원 로고 이미지 URL
const BRAND_COLOR = params.get('color');              // 브랜드 포인트 컬러 (hex, # 없이. 예: 0F5132)

if(BRAND_COLOR){
  document.documentElement.style.setProperty('--deep', `#${BRAND_COLOR}`);
  document.documentElement.style.setProperty('--deep-light', `#${BRAND_COLOR}cc`);
}

if(!CLINIC_NAME || !GOOGLE_REVIEW_URL){
  document.getElementById('setupNeeded').style.display = 'block';
} else {
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('bar').style.display = 'flex';
  document.getElementById('clinicNameLabel').textContent = decodeURIComponent(CLINIC_NAME);
  initApp();
}

function initApp(){
  let LANG = null;
  const state = { method:null, visit:null, category:null, treatment:null, experience:[], improvements:[], additionalNote:'' };
  let flow = [];
  let stepIndex = 0;
  let generatedText = "";

  const smileFill = document.getElementById('smileFill');
  const smileLabel = document.getElementById('smileLabel');
  const mainBtn = document.getElementById('mainBtn');
  const ghostBtn = document.getElementById('ghostBtn');
  const loadingEl = document.getElementById('loading');
  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');
  const toast = document.getElementById('toast');
  const langSwitchBtn = document.getElementById('langSwitchBtn');

  // 언어 선택 옵션 렌더 (항상 5개 언어명은 고유하게 표시)
  const langBox = document.getElementById('langOptions');
  LANG_META.forEach(l=>{
    const d = document.createElement('div');
    d.className = 'opt lang';
    d.dataset.lang = l.code;
    d.textContent = `${l.flag} ${l.name}`;
    langBox.appendChild(d);
  });

  langBox.addEventListener('click', (e)=>{
    const el = e.target.closest('[data-lang]');
    if(!el) return;
    LANG = el.dataset.lang;
    langSwitchBtn.style.display = 'block';
    langSwitchBtn.textContent = `🌐 ${T().ui.changeLanguage}`;
    applyLanguage();
    goToStep('0');
  });

  langSwitchBtn.addEventListener('click', ()=>{
    resultCard.classList.remove('active');
    ghostBtn.style.display = 'none';
    mainBtn.style.display = 'block';
    state.method = null; state.visit = null; state.category = null; state.treatment = null;
    state.experience = []; state.improvements = []; state.additionalNote = '';
    goToStep('lang');
  });

  function T(){ return TRANSLATIONS[LANG]; }

  function applyLanguage(){
    const t = T();
    document.getElementById('txtHeading').textContent = t.ui.heading;
    document.getElementById('txtSubtitle').textContent = t.ui.subtitle;
    document.getElementById('txtEyebrow0').textContent = t.ui.eyebrow0;
    document.getElementById('txtTitle0').textContent = t.ui.title0;
    document.getElementById('optMethodAI').textContent = t.ui.methodAI;
    document.getElementById('optMethodManual').textContent = t.ui.methodManual;
    document.getElementById('txtEyebrow1').textContent = t.ui.eyebrow1;
    document.getElementById('txtTitle1').textContent = t.ui.title1;
    document.getElementById('txtEyebrow2').textContent = t.ui.eyebrow2;
    document.getElementById('txtTitle2').textContent = t.ui.title2;
    document.getElementById('txtEyebrow3').textContent = t.ui.eyebrow3;
    document.getElementById('txtEyebrow4').textContent = t.ui.eyebrow4;
    document.getElementById('txtTitle4').textContent = t.ui.title4;
    document.getElementById('txtDesc4').textContent = t.ui.desc4;
    document.getElementById('txtEyebrow5').innerHTML = `${t.ui.eyebrow5} <span class="step-optional-tag">${t.ui.tag5}</span>`;
    document.getElementById('txtTitle5').textContent = t.ui.title5;
    document.getElementById('txtDesc5').textContent = t.ui.desc5;
    document.getElementById('txtNoteLabel').textContent = t.ui.noteLabel;
    document.getElementById('additionalNote').placeholder = t.ui.notePlaceholder;
    document.getElementById('txtManualEyebrow').textContent = t.ui.manualEyebrow;
    document.getElementById('txtManualTitle').textContent = t.ui.manualTitle;
    document.getElementById('manualText').placeholder = t.ui.manualPlaceholder;
    document.getElementById('txtLoading').textContent = t.ui.loadingText;
    document.getElementById('txtResultBadge').textContent = t.ui.resultBadge;
    document.getElementById('txtPlatformLabel').textContent = t.ui.platformLabel;
    document.getElementById('googleBtn').textContent = t.ui.googleBtnLabel;
    document.getElementById('naverBtn').textContent = t.ui.naverBtnLabel;
    document.getElementById('txtPrivacyNote').textContent = t.ui.privacyNote;
    document.getElementById('treatmentTitle').textContent = t.ui.title3Default;
    document.getElementById('txtHomepageIconLabel').textContent = t.ui.homepageIconLabel;
    document.getElementById('txtKakaoLabel').textContent = t.ui.kakaoShareLabel;
    document.getElementById('txtWechatLabel').textContent = t.ui.wechatShareLabel;
    document.getElementById('txtGuideNote').textContent = t.ui.guideNote;
    document.getElementById('txtThanksNote').textContent = t.ui.thanksNote;
    document.getElementById('txtCallLabel').textContent = t.ui.callLabel;
    document.getElementById('txtInstagramLabel').textContent = t.ui.instagramLabel;
    document.getElementById('txtBlogLabel').textContent = t.ui.blogLabel;
    document.getElementById('txtEventTag').textContent = t.ui.eventTag;
    document.getElementById('txtReferralLabel').textContent = t.ui.referralLabel;

    if(HOMEPAGE_URL){
      const link = document.getElementById('homepageLink');
      link.style.display = 'inline-block';
      link.href = decodeURIComponent(HOMEPAGE_URL);
      document.getElementById('homepageLinkText').textContent = t.ui.homepageLinkLabel;

      const iconLink = document.getElementById('homepageIconBtn');
      iconLink.style.display = 'flex';
      iconLink.href = decodeURIComponent(HOMEPAGE_URL);
    }

    if(LOGO_URL){
      const logo = document.getElementById('clinicLogo');
      logo.src = decodeURIComponent(LOGO_URL);
      logo.alt = decodeURIComponent(CLINIC_NAME);
      logo.style.display = 'block';
    }

    if(DOCTOR_PHOTO || DOCTOR_GREETING){
      document.getElementById('doctorCard').style.display = 'flex';
      if(DOCTOR_PHOTO) document.getElementById('doctorPhotoImg').src = decodeURIComponent(DOCTOR_PHOTO);
      if(DOCTOR_GREETING) document.getElementById('doctorGreetingText').textContent = decodeURIComponent(DOCTOR_GREETING);
    }

    if(PHONE){
      const callBtn = document.getElementById('callBtn');
      callBtn.style.display = 'flex';
      callBtn.href = `tel:${decodeURIComponent(PHONE)}`;
    }

    if(INSTAGRAM_URL || BLOG_URL){
      document.getElementById('snsRow').style.display = 'flex';
      if(INSTAGRAM_URL){
        const ig = document.getElementById('instagramBtn');
        ig.style.display = 'flex';
        ig.href = decodeURIComponent(INSTAGRAM_URL);
      }
      if(BLOG_URL){
        const bl = document.getElementById('blogBtn');
        bl.style.display = 'flex';
        bl.href = decodeURIComponent(BLOG_URL);
      }
    }

    if(EVENT_NOTE && (INSTAGRAM_URL || BLOG_URL)){
      document.getElementById('eventBanner').style.display = 'block';
      document.getElementById('txtEventNote').textContent = decodeURIComponent(EVENT_NOTE);
    }

    renderVisit(); renderCategory(); renderExperience(); renderImprovement();
    if(state.category) renderTreatments(state.category);
    refreshButton();
  }

  function renderVisit(){
    const box = document.getElementById('visitOptions');
    box.innerHTML = '';
    VISIT_ORDER.forEach(id=>{
      const d = document.createElement('div');
      d.className='opt'; d.dataset.group='visit'; d.dataset.value=id;
      d.textContent = T().visit[id];
      if(state.visit === id) d.classList.add('selected');
      box.appendChild(d);
    });
  }
  function renderCategory(){
    const box = document.getElementById('categoryOptions');
    box.innerHTML = '';
    CATEGORY_ORDER.forEach(id=>{
      const d = document.createElement('div');
      d.className='opt category'; d.dataset.group='category'; d.dataset.value=id;
      d.textContent = `${ICONS.category[id]} ${T().category[id]}`;
      if(state.category === id) d.classList.add('selected');
      box.appendChild(d);
    });
  }
  function renderTreatments(categoryId){
    const box = document.getElementById('treatmentOptions');
    box.innerHTML = '';
    const t = T();
    document.getElementById('treatmentTitle').textContent = categoryId
      ? `${t.category[categoryId]} ${t.ui.title3Suffix}` : t.ui.title3Default;
    (TREATMENT_ORDER[categoryId] || []).forEach(id=>{
      const d = document.createElement('div');
      d.className='opt'; d.dataset.group='treatment'; d.dataset.value=id;
      d.textContent = `${ICONS.treatment[id]} ${t.treatment[id]}`;
      if(state.treatment === id) d.classList.add('selected');
      box.appendChild(d);
    });
  }
  function renderExperience(){
    const box = document.getElementById('experienceGroups');
    box.innerHTML = '';
    const t = T();
    ROLE_ORDER.forEach(role=>{
      const wrap = document.createElement('div');
      wrap.className = 'role-group';
      const header = document.createElement('p');
      header.className = 'role-header';
      header.textContent = `${ICONS.role[role]} ${t.role[role]}`;
      wrap.appendChild(header);
      const grid = document.createElement('div');
      grid.className = 'options';
      EXPERIENCE_ITEM_ORDER[role].forEach(id=>{
        const d = document.createElement('div');
        d.className='opt'; d.dataset.group='experience'; d.dataset.role=role; d.dataset.value=id;
        d.textContent = t.experienceItem[id];
        if(state.experience.some(e=>e.key === `${role}::${id}`)) d.classList.add('selected');
        grid.appendChild(d);
      });
      wrap.appendChild(grid);
      box.appendChild(wrap);
    });
  }
  function renderImprovement(){
    const box = document.getElementById('improvementGroups');
    box.innerHTML = '';
    const t = T();
    IMPROVEMENT_CATEGORY_ORDER.forEach(cat=>{
      const wrap = document.createElement('div');
      wrap.className = 'role-group';
      const header = document.createElement('p');
      header.className = 'role-header';
      header.textContent = `${ICONS.improvementCategory[cat]} ${t.improvementCategory[cat]}`;
      wrap.appendChild(header);
      const grid = document.createElement('div');
      grid.className = 'options';
      IMPROVEMENT_ITEM_ORDER[cat].forEach(id=>{
        const d = document.createElement('div');
        d.className='opt improvement'; d.dataset.group='improvement'; d.dataset.category=cat; d.dataset.value=id;
        d.textContent = t.improvementItem[id];
        if(state.improvements.some(i=>i.key === `${cat}::${id}`)) d.classList.add('selected');
        grid.appendChild(d);
      });
      wrap.appendChild(grid);
      box.appendChild(wrap);
    });
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 1600);
  }
  function setSmile(fraction, label){
    smileFill.style.strokeDashoffset = 128 - (128 * fraction);
    smileLabel.textContent = label;
  }
  function goToStep(name){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.querySelector(`.step[data-step="${name}"]`).classList.add('active');
  }
  function currentStepName(){ return flow[stepIndex]; }

  function refreshButton(){
    if(!LANG) return;
    const t = T();
    if(state.method === null){
      mainBtn.textContent = t.ui.btnNext; mainBtn.disabled = true;
      setSmile(0, t.ui.smileStart);
      return;
    }
    if(state.method === 'manual'){
      const txt = document.getElementById('manualText').value.trim();
      mainBtn.textContent = t.ui.btnCheckReview;
      mainBtn.disabled = txt.length === 0;
      setSmile(txt.length ? 1 : 0.15, txt.length ? t.ui.smileReady : t.ui.title5);
      return;
    }
    const name = currentStepName();
    if(name === '1') mainBtn.disabled = !state.visit;
    else if(name === '2') mainBtn.disabled = !state.category;
    else if(name === '3') mainBtn.disabled = !state.treatment;
    else if(name === '4'){ mainBtn.disabled = state.experience.length===0; mainBtn.textContent = t.ui.btnNext; }
    else if(name === '5'){ mainBtn.disabled = false; mainBtn.textContent = t.ui.btnMakeReview; }
    else mainBtn.textContent = t.ui.btnNext;
    const done = [state.visit, state.category, state.treatment, state.experience.length>0].filter(Boolean).length;
    setSmile(done/4, done===4 ? t.ui.smileReady : t.ui.smileProgress(done,4));
  }

  function nextStep(){
    if(state.method === 'manual'){ generatedText = document.getElementById('manualText').value.trim(); showResult(); return; }
    if(currentStepName() === '5'){ generateReview(); return; }
    stepIndex++;
    goToStep(currentStepName());
    refreshButton();
  }

  document.addEventListener('click', (e)=>{
    const opt = e.target.closest('.opt');
    if(!opt || opt.dataset.lang) return;
    const group = opt.dataset.group, value = opt.dataset.value;
    if(group === 'method'){
      document.querySelectorAll('[data-group="method"]').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      state.method = value;
      if(value === 'ai'){ flow=['1','2','3','4','5']; stepIndex=0; goToStep('1'); }
      else goToStep('manual');
      refreshButton(); return;
    }
    if(group === 'visit'){
      document.querySelectorAll('[data-group="visit"]').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected'); state.visit = value;
    }
    if(group === 'category'){
      document.querySelectorAll('[data-group="category"]').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected'); state.category = value; state.treatment = null;
      renderTreatments(value);
    }
    if(group === 'treatment'){
      document.querySelectorAll('[data-group="treatment"]').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected'); state.treatment = value;
    }
    if(group === 'experience'){
      opt.classList.toggle('selected');
      const role = opt.dataset.role, key = `${role}::${value}`;
      const idx = state.experience.findIndex(x=>x.key===key);
      if(idx >= 0) state.experience.splice(idx,1);
      else state.experience.push({ key, role, id:value });
    }
    if(group === 'improvement'){
      opt.classList.toggle('selected');
      const category = opt.dataset.category, key = `${category}::${value}`;
      const idx = state.improvements.findIndex(x=>x.key===key);
      if(idx >= 0) state.improvements.splice(idx,1);
      else state.improvements.push({ key, category, id:value });
    }
    refreshButton();
  });

  document.getElementById('manualText').addEventListener('input', refreshButton);
  document.getElementById('additionalNote').addEventListener('input', (e)=>{ state.additionalNote = e.target.value.trim(); });

  mainBtn.addEventListener('click', ()=>{ nextStep(); });

  async function generateReview(){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    loadingEl.classList.add('active');
    mainBtn.style.display = 'none';
    const t = T();

    const experiencePayload = state.experience.map(e => ({ role: t.role[e.role], label: t.experienceItem[e.id] }));
    const improvementPayload = state.improvements.map(i => t.improvementItem[i.id]);

    try{
      const res = await fetch('/api/generate-review', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          clinicName: decodeURIComponent(CLINIC_NAME),
          language: LANG_FULL_NAME[LANG],
          visit: t.visit[state.visit],
          category: t.category[state.category] || '',
          treatment: t.treatment[state.treatment],
          experience: experiencePayload,
          improvements: improvementPayload,
          additionalNote: state.additionalNote,
          region: REGION ? decodeURIComponent(REGION) : ''
        })
      });
      const data = await res.json();
      generatedText = data.text || "Something went wrong. Please try again.";
    }catch(err){
      generatedText = "Something went wrong. Please try again.";
    }
    logReviewEvent(state.improvements.length > 0 || !!state.additionalNote);
    loadingEl.classList.remove('active');
    showResult();
  }

  function showResult(){
    const t = T();
    resultText.textContent = generatedText;
    resultCard.classList.add('active');
    mainBtn.style.display = 'none';
    if(NAVER_REVIEW_URL) document.getElementById('naverBtn').style.display = 'block';
    ghostBtn.style.display = 'block';
    ghostBtn.textContent = t.ui.btnRegenerate;
    setSmile(1, t.ui.smileReady);
  }

  ghostBtn.addEventListener('click', ()=>{
    resultCard.classList.remove('active');
    ghostBtn.style.display = 'none';
    mainBtn.style.display = 'block';
    mainBtn.textContent = state.method === 'manual' ? T().ui.btnCheckReview : T().ui.btnMakeReview;
    if(state.method === 'manual') goToStep('manual');
    else { stepIndex = flow.indexOf('5'); goToStep('5'); generateReview(); }
  });

  function copyText(text){ return navigator.clipboard.writeText(text); }

  document.getElementById('googleBtn').addEventListener('click', ()=>{
    const finalText = state.method === 'manual' ? document.getElementById('manualText').value.trim() : generatedText;
    copyText(finalText).then(()=>{ showToast(T().ui.toastCopyGoogle); }).catch(()=>{ showToast(T().ui.toastCopyFail); });
    setTimeout(()=>{ window.open(decodeURIComponent(GOOGLE_REVIEW_URL), '_blank'); }, 500);
  });
  document.getElementById('naverBtn').addEventListener('click', ()=>{
    const finalText = state.method === 'manual' ? document.getElementById('manualText').value.trim() : generatedText;
    copyText(finalText).then(()=>{ showToast(T().ui.toastCopyNaver); }).catch(()=>{ showToast(T().ui.toastCopyFail); });
    setTimeout(()=>{ window.open(decodeURIComponent(NAVER_REVIEW_URL), '_blank'); }, 500);
  });

  document.getElementById('kakaoShareBtn').addEventListener('click', ()=>{
    const finalText = state.method === 'manual' ? document.getElementById('manualText').value.trim() : generatedText;
    if(navigator.share){
      navigator.share({ text: finalText }).catch(()=>{});
    } else {
      copyText(finalText).then(()=>{ showToast(T().ui.toastCopyKakao); }).catch(()=>{ showToast(T().ui.toastCopyFail); });
    }
  });
  document.getElementById('wechatShareBtn').addEventListener('click', ()=>{
    const finalText = state.method === 'manual' ? document.getElementById('manualText').value.trim() : generatedText;
    if(navigator.share){
      navigator.share({ text: finalText }).catch(()=>{
        copyText(finalText).then(()=>{ showToast(T().ui.toastCopyWechat); }).catch(()=>{ showToast(T().ui.toastCopyFail); });
      });
    } else {
      copyText(finalText).then(()=>{ showToast(T().ui.toastCopyWechat); }).catch(()=>{ showToast(T().ui.toastCopyFail); });
    }
  });

  document.getElementById('referralBtn').addEventListener('click', ()=>{
    const t = T();
    const clinicName = decodeURIComponent(CLINIC_NAME);
    const shareText = t.ui.referralShareText(clinicName);
    const pageUrl = window.location.href;
    if(navigator.share){
      navigator.share({ title: clinicName, text: shareText, url: pageUrl }).catch(()=>{});
    } else {
      copyText(`${shareText} ${pageUrl}`).then(()=>{ showToast(t.ui.toastReferralCopy); }).catch(()=>{ showToast(t.ui.toastCopyFail); });
    }
  });

  // 병원 운영진용 익명 통계 · 부정 피드백 알림 (리뷰 원문/개인정보는 전송하지 않음)
  function logReviewEvent(hasImprovement){
    if(state.method !== 'ai') return;
    try{
      fetch('/api/log-review', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          clinicId: CLINIC_ID ? decodeURIComponent(CLINIC_ID) : decodeURIComponent(CLINIC_NAME),
          language: LANG,
          visit: state.visit,
          category: state.category,
          treatment: state.treatment,
          experienceRoles: [...new Set(state.experience.map(e=>e.role))],
          hasImprovement,
          improvementCategories: state.improvements.map(i=>i.category)
        })
      }).catch(()=>{});
    }catch(e){}
  }
}
</script>
</body>
</html>
